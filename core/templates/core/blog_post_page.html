{% extends "base.html" %}
{% load wagtailcore_tags wagtailimages_tags %}

{% block content %}

        <h1>{{ page.title }}</h1>
        <time>{{ page.date }}</time>
        {% if page.feed_image %}
            {% image page.feed_image width-1200 %}
        {% endif %}
        <div>{{ page.body }}</div>
    </article>
{% endblock %}
