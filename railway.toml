# Railway deploy configuration. Full runbook in DEPLOY.md.
#
# Build:   Nixpacks detects uv + uv.lock and installs dependencies (uv sync)
#          automatically. We append collectstatic so the hashed/manifested
#          static files are baked into the image — WhiteNoise serves them at
#          runtime. (collectstatic must run at BUILD, not pre-deploy: pre-deploy
#          runs in a throwaway container whose filesystem the web process never
#          sees.) Requires SECRET_KEY + DJANGO_SETTINGS_MODULE in the build env.
#
# Release: migrate runs as a pre-deploy step against the live Postgres, before
#          the new version goes live. (DB isn't reachable at build time.)
#
# Start:   gunicorn binds the $PORT Railway injects.

[build]
builder = "NIXPACKS"
buildCommand = "uv run python manage.py collectstatic --noinput"

[deploy]
preDeployCommand = "uv run python manage.py migrate --noinput"
startCommand = "uv run gunicorn config.wsgi --bind 0.0.0.0:$PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
