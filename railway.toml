# Railway deploy configuration. Full runbook in DEPLOY.md.
#
# Build:   Railway builds the Dockerfile (we own the build — see the Dockerfile
#          header for why we left Nixpacks). Dependencies are installed with uv
#          and collectstatic is baked into the image, so the hashed/manifested
#          static files ship inside it and WhiteNoise serves them at runtime.
#          (collectstatic must run at BUILD, not pre-deploy: pre-deploy runs in a
#          throwaway container whose filesystem the web process never sees.)
#
# Release: migrate runs as a pre-deploy step against the live Postgres, before
#          the new version goes live. (The DB isn't reachable at build time.) The
#          venv is on PATH in the image, so `python` resolves without `uv run`.
#
# Start:   comes from the Dockerfile CMD — gunicorn binds the $PORT Railway
#          injects.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "python manage.py migrate --noinput"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
